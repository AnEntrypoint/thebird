<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#247420" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#3FA93A" media="(prefers-color-scheme: dark)">
<meta name="color-scheme" content="light dark">
<title>thebird / chat</title>
<meta name="description" content="thebird — anthropic-sdk-to-multi-provider bridge, in-browser chat console.">
<meta name="author" content="247420 / AnEntrypoint">
<link rel="stylesheet" href="vendor/xterm.css" />
<link rel="stylesheet" href="tui.css" />
<script>
(() => {
  const saved = localStorage.getItem('tui_theme');
  const prefDark = window.matchMedia?.('(prefers-color-scheme: dark)').matches;
  const theme = saved || (prefDark ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', theme);
  window.setTheme = t => {
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('tui_theme', t);
    window.dispatchEvent(new CustomEvent('tui-theme-change', { detail: t }));
  };
  window.toggleTheme = () => window.setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  window.matchMedia?.('(prefers-color-scheme: dark)').addEventListener?.('change', e => { if (!localStorage.getItem('tui_theme')) window.setTheme(e.matches ? 'dark' : 'light'); });
  (window.__debug = window.__debug || {}).theme = { get current() { return document.documentElement.getAttribute('data-theme'); }, set: window.setTheme, toggle: window.toggleTheme };
})();
</script>
</head>
<body>
<div style="display:flex;flex-direction:column;height:100%">
  <div class="tui-header">
    <span class="brand">247420<span class="slash"> / </span>thebird<span class="slash"> / </span><span class="leaf">chat</span></span>
    <span class="tagline">anthropic sdk ↔ multi-provider bridge · gemini, openai-compat, any model</span>
  </div>
  <div class="tui-tabs">
    <button id="tab-chat" class="tui-tab active" onclick="switchTab('chat')">chat</button>
    <button id="tab-term" class="tui-tab" onclick="switchTab('term')">terminal</button>
    <button id="tab-preview" class="tui-tab" onclick="switchTab('preview')">preview</button>
    <button class="tui-tab" style="margin-left:auto" onclick="toggleTheme()" title="Toggle dark/light">◐</button>
  </div>
  <div id="pane-chat" style="flex:1;overflow:hidden;display:flex;flex-direction:column">
    <bird-chat></bird-chat>
  </div>
  <div id="pane-term" class="hidden" style="flex:1;overflow:hidden;display:flex;flex-direction:column">
    <div id="term-container" style="flex:1"></div>
  </div>
  <div id="pane-preview" class="hidden" style="flex:1;overflow:hidden;display:flex;flex-direction:column">
    <div class="tui-toolbar">
      <button class="tui-btn" onclick="refreshPreview()">[reload]</button>
    </div>
    <iframe id="preview-frame" style="width:100%;flex:1;border:0;background:var(--paper)" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
  </div>
</div>
<script>
function callExpressRoute(path, method) {
  const handlers = window.__debug?.shell?.httpHandlers || {};
  const app = Object.values(handlers)[0];
  if (!app?.routes) return null;
  const routes = app.routes[method || 'GET'] || [];
  const match = routes.find(r => r.path === '*' || r.path === path || path.startsWith(r.path));
  if (!match) return null;
  return new Promise(resolve => {
    let done = false;
    const finish = (status, body, ct) => { if (done) return; done = true; resolve({ status, body, ct }); };
    const res = {
      _body: '', _status: 200, _ct: 'text/html',
      writeHead(code, headers) { this._status = code; if (headers?.['Content-Type']) this._ct = headers['Content-Type']; return this; },
      setHeader(k, v) { if (k.toLowerCase() === 'content-type') this._ct = v; return this; },
      write(chunk) { this._body += String(chunk); return true; },
      end(chunk) { if (chunk != null) this._body += String(chunk); finish(this._status, this._body, this._ct); },
      send(b) { this._body = typeof b === 'string' ? b : JSON.stringify(b); finish(this._status, this._body, this._ct); },
      json(o) { this._ct = 'application/json'; this.send(JSON.stringify(o)); },
      status(n) { this._status = n; return this; },
    };
    const req = { method: method || 'GET', url: path, path, query: {}, headers: {}, [Symbol.asyncIterator]: async function* () {} };
    try {
      const r = match.fn(req, res);
      if (r && typeof r.then === 'function') r.catch(e => finish(500, e.message, 'text/plain'));
    } catch(e) { finish(500, e.message, 'text/plain'); }
    setTimeout(() => finish(res._status, res._body, res._ct), 5000);
  });
}
async function refreshPreview() {
  const iframe = document.getElementById('preview-frame');
  if (!iframe) return;
  const swReady = window.__debug?.sw?.registered;
  const handlers = window.__debug?.shell?.httpHandlers || {};
  const hasServer = Object.keys(handlers).length > 0;
  if (swReady && hasServer) {
    const target = './preview/';
    if (!iframe.src || !iframe.src.includes('/preview/')) iframe.src = target;
    else iframe.contentWindow?.location.reload();
    return;
  }
  const result = await callExpressRoute('/');
  if (result) { iframe.srcdoc = result.body; return; }
  const snap = window.__debug?.idbSnapshot || {};
  const htmlFiles = Object.keys(snap).filter(k => k.endsWith('.html'));
  const pick = htmlFiles.find(k => k === 'index.html') || htmlFiles[0];
  if (pick) { iframe.srcdoc = snap[pick]; return; }
  const cs = getComputedStyle(document.documentElement);
  const fg = cs.getPropertyValue('--ink').trim(), bg = cs.getPropertyValue('--paper').trim();
  iframe.srcdoc = `<pre style="color:${fg};background:${bg};padding:1ch;font-family:monospace">no files yet</pre>`;
}
function switchTab(t) {
  ['chat', 'term', 'preview'].forEach(id => {
    document.getElementById('pane-' + id).classList.toggle('hidden', id !== t);
    const tab = document.getElementById('tab-' + id);
    tab.classList.toggle('active', id === t);
  });
  if (t === 'preview') refreshPreview();
}
window.showPreview = () => switchTab('preview');
</script>
<script type="module" src="app.js"></script>
<script type="module" src="terminal.js"></script>
<script type="module" src="preview-sw-client.js"></script>
</body>
</html>
