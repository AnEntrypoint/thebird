- id: hermes-pyodide-asgi-bridge
  subject: Mount Hermes ASGI app inside Pyodide; route /hermes/* through service worker
  status: pending
  description: |
    Foundation for hosting any ASGI Python app (Hermes, FastAPI examples,
    Starlette demos) inside thebird without a host process. Adds an
    asgi-bridge module that wraps an in-Pyodide ASGI app and answers
    fetch() requests via the preview service worker. Hermes is the
    first witness target — full integration depends on dep wheel
    availability and is tracked in a follow-up item only after this
    foundation lands.
  effort: large
  category: feature
  route_family: integration
  load: 0.9
  failure_modes: [F15-extension-missing, F16-cors, F10-runtime-mismatch]
  route_fit: unexamined
  authorization: none
  blocking: []
  blockedBy: [pyodide-lazy-runtime]
  acceptance:
    - asgi-bridge module exposes mount(app, prefix) → registers SW route
    - test.js asserts mount() registers; a stub ASGI app round-trips text/plain "ok"
  edge_cases:
    - ASGI scope construction (lifespan, http.request, http.response.start/body)
    - Streaming responses
    - Pyodide event loop integration
